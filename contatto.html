<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contatto - SL COMPANY</title>
  <link rel="icon" type="image/png" href="media/logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="contact-page">
  <header class="site-header">
    <div class="brand">
      <div class="logo-mark">
        <img src="media/logo.png" alt="Logo Sara Business Studio">
      </div>
      <div>
        <span class="brand-name">SL COMPANY</span>
        <span class="brand-tag">Business Studio</span>
      </div>
    </div>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <label for="nav-toggle" class="menu-toggle" aria-label="Apri menu">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="servizi.html">Servizi</a>
      <a href="chi-siamo.html">Chi siamo</a>
    </nav>
  </header>

  <main>
    <section class="contact-top-panel">
      <div class="container">
        <div class="contact-banner">
          <img src="media/banner.png" alt="Architettura moderna">
        </div>
    </section>

    <section class="contact-form-section">
      <div class="container contact-form-layout">
        <div class="contact-form-copy">
          <span class="eyebrow">Mettiti in contatto</span>
          <h1>Hai una richiesta o un feedback per noi?</h1>
          <p class="section-intro">Compila il modulo sottostante per contattare il nostro team.</p>

          <form action="#" class="contact-form" method="post">
            <div class="form-field">
              <label for="name" class="form-label">Name</label>
              <input type="text" id="name" name="name" class="form-input" placeholder="Enter your Name" required>
            </div>

            <div class="form-field">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" name="email" class="form-input" placeholder="Enter a valid email address" required>
            </div>

            <div class="form-field">
              <label for="message" class="form-label">How can we help?</label>
              <textarea id="message" name="message" class="form-textarea" placeholder="Scrivi qui il tuo messaggio..." required></textarea>
            </div>

            <button type="submit" class="btn btn-contact">INVIA</button>
          </form>
        </div>

        <div class="contact-map">
          <div class="map-frame">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d24183.839028965027!2d-74.01311936146211!3d40.71066274440085!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25a2128b1e73f%3A0xc80b8f06e177fe62!2sNew%20York%2C%20NY%2C%20USA!5e0!3m2!1sit!2sit!4v1710000000000!5m2!1sit!2sit"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
            </div>
            <div class="social-frame">         
              <h1>SOCIAL</h1>
              <div class="card">
                <a href="https://www.instagram.com" class="social-icons">
                  <span>Follow</span>
